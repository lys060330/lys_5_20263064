<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.js 작품 모음</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>나의 p5.js 작품</h1>
        <p>접속 즉시 작동하는 정적·동적 작품 모음입니다.</p>
    </header>

    <main id="projects">
        <article class="project">
            <div class="frame">
                <iframe src="과제1/index.html" scrolling="no" title="과제1"></iframe>
            </div>
            <div class="caption">
                <h2>과제 1 · 추상화 그리기</h2>
                <a class="btn" href="과제1/index.html" target="_blank">전체 보기 ↗</a>
            </div>
        </article>

        <article class="project">
            <div class="frame">
                <iframe src="과제4/index.html" scrolling="no" title="과제4"></iframe>
            </div>
            <div class="caption">
                <h2>과제 4 · 추상화에 움직임 부여</h2>
                <a class="btn" href="과제4/index.html" target="_blank">전체 보기 ↗</a>
            </div>
        </article>

        <article class="project">
            <div class="frame">
                <iframe src="과제2/index.html" scrolling="no" title="과제2"></iframe>
            </div>
            <div class="caption">
                <h2>과제 2 · 캐리커쳐 그리기</h2>
                <a class="btn" href="과제2/index.html" target="_blank">전체 보기 ↗</a>
            </div>
        </article>

        <article class="project">
            <div class="frame">
                <iframe src="과제3/index.html" scrolling="no" title="과제3"></iframe>
            </div>
            <div class="caption">
                <h2>과제 3 · 캐리커쳐에 움직임 부여</h2>
                <a class="btn" href="과제3/index.html" target="_blank">전체 보기 ↗</a>
            </div>
        </article>
    </main>

    <script>
        // iframe 안의 실제 canvas 크기를 읽어 칸에 꼭 맞게 축소
        function fitFrame(f) {
            var ifr = f.querySelector('iframe');
            try {
                var doc = ifr.contentDocument || ifr.contentWindow.document;
                if (doc.body) { doc.body.style.margin = '0'; doc.body.style.padding = '0'; }
                var canvas = doc.querySelector('canvas');
                if (!canvas) return false;
                var w = canvas.offsetWidth, h = canvas.offsetHeight;
                if (!w || !h) return false;
                var scale = f.clientWidth / w;
                f.style.height = (h * scale) + 'px';
                ifr.style.width = w + 'px';
                ifr.style.height = h + 'px';
                ifr.style.transform = 'scale(' + scale + ')';
                return true;
            } catch (e) {
                return false;
            }
        }

        function fitAll() {
            document.querySelectorAll('.frame').forEach(function (f) {
                if (fitFrame(f)) return;
                var tries = 0;
                var t = setInterval(function () {            // 스케치가 준비될 때까지 재시도
                    if (fitFrame(f) || ++tries > 50) clearInterval(t);
                }, 100);
            });
        }

        window.addEventListener('load', fitAll);
        window.addEventListener('resize', fitAll);
    </script>
</body>
</html>
